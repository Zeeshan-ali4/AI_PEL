services:
  app:
    build: .
    container_name: ai_pel_app
    ports:
      - "8080:8080"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: "8080"
      OPA_URL: http://opa:8181
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ai_pel
      POSTGRES_USER: ai_pel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required} # NOSONAR - required env var reference, not a committed secret
    depends_on:
      - opa
      - postgres

  opa:
    image: openpolicyagent/opa:latest
    container_name: ai_pel_opa
    command: ["run", "--server", "--addr=0.0.0.0:8181", "/policies", "/data"]
    ports:
      - "8181:8181"
    volumes:
      - ./opa/policies:/policies:ro
      - ./opa/data:/data:ro

  postgres:
    image: postgres:15
    container_name: ai_pel_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_pel
      POSTGRES_USER: ai_pel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required} # NOSONAR - required env var reference, not a committed secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
