<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AI PEL — Runtime Policy Enforcement Gate{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body class="bg-slate-50 text-slate-900">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto max-w-6xl px-6 py-5 flex items-center justify-between">
        <a href="/" class="text-xl font-semibold tracking-tight">AI PEL Assurance Gate</a>
        <nav class="text-sm text-slate-500 flex gap-4">
          <a href="/" class="hover:text-slate-900">Control dashboard</a>
          <a href="/audit" class="hover:text-slate-900">Audit log &amp; integrity</a>
        </nav>
      </div>
    </header>
    <main class="mx-auto max-w-6xl px-6 py-8">
      {% block content %}{% endblock %}
    </main>
    <footer class="mx-auto max-w-6xl px-6 py-8 text-xs text-slate-400">
      Demonstration build — figures marked "illustrative" are simulated, not live agent telemetry.
    </footer>
  </body>
</html>
