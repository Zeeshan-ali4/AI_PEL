<section class="card regulator-questions">
  <h2>If a regulator asked...</h2>
  <p class="card-note">
    A concise index from common assurance questions to the exact fields already captured in this record.
  </p>
  <div class="stack" style="margin-top: 0.875rem; gap: 0.875rem;">
    {% for row in regulator_question_rows %}
    <article class="decision-tile">
      <h3 style="margin: 0 0 0.375rem; color: var(--text); font-size: 0.95rem;">{{ row.question }}</h3>
      <p class="eyebrow" style="margin-bottom: 0.375rem;">Fields: {{ row.answer_field_label }}</p>
      <p style="margin: 0; color: var(--text-soft);">{{ row.answer_value }}</p>
    </article>
    {% endfor %}
  </div>
</section>
